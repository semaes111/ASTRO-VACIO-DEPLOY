<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astro Dorado · Informe Personal del Alma</title>
<meta name="description" content="Tu carta natal, tu numerología, y la cartografía de tu destino.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   ASTRO DORADO · INFORME PERSONAL DEL ALMA
   Estilo editorial-ritual · místico · dorado sobre negro cósmico
   ============================================================ */

:root{
  --void: #000000;
  --cosmos: #050510;
  --nebula: #0a0a1a;
  --stardust: #111128;
  --deep: #1a1a3a;

  --ink: #f5ecd7;
  --ink-dim: #bfb39a;
  --ink-mute: #6e6653;

  --gold: #d4af37;
  --gold-bright: #f0ce5a;
  --gold-deep: #9c7e1f;
  --gold-wash: rgba(212,175,55,.08);

  --aurora: #7B68EE;
  --aurora-dim: #5b48ce;
  --eclipse: #9370DB;
  --celestial: #4169E1;
  --supernova: #FF6B6B;

  --fire: #FF4500;
  --earth: #2E8B57;
  --air: #87CEEB;
  --water: #4682B4;

  --serif: "Cormorant Garamond", "Playfair Display", serif;
  --display: "Playfair Display", serif;
  --sans: "DM Sans", system-ui, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, monospace;

  --max: 1360px;
  --read: 720px;

  --ease-out: cubic-bezier(.16,1,.3,1);
  --ease-smooth: cubic-bezier(.65,0,.35,1);
  --ease-drama: cubic-bezier(.85,0,.15,1);
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--void);color:var(--ink);font-family:var(--sans);line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
html{scroll-behavior:smooth}
body{
  min-height:100vh;
  overflow-x:hidden;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(123,104,238,.18), transparent 60%),
    radial-gradient(ellipse 60% 40% at 90% 40%, rgba(212,175,55,.07), transparent 60%),
    radial-gradient(ellipse 70% 50% at 10% 80%, rgba(147,112,219,.12), transparent 60%),
    linear-gradient(180deg, #000 0%, #050510 40%, #0a0a1a 100%);
  cursor: none;
}
@media (pointer:coarse){
  body{cursor:auto}
  .cursor-dot,.cursor-ring{display:none}
}

a{color:inherit;text-decoration:none}
button{background:none;border:0;color:inherit;font:inherit;cursor:none}
img{max-width:100%;display:block}
::selection{background:var(--gold);color:var(--void)}

/* ---------- CURSOR ---------- */
.cursor-dot,.cursor-ring{
  position:fixed;top:0;left:0;pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  will-change:transform;
}
.cursor-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--gold-bright);
  box-shadow:0 0 8px var(--gold),0 0 20px rgba(212,175,55,.4);
  transition:transform .15s var(--ease-out), background .3s;
}
.cursor-ring{
  width:36px;height:36px;border-radius:50%;
  border:1px solid rgba(212,175,55,.5);
  transition:transform .35s var(--ease-out), width .3s, height .3s, border-color .3s;
}
.cursor-ring.hover{width:70px;height:70px;border-color:var(--gold-bright);mix-blend-mode:screen}
.cursor-dot.hover{background:var(--stellar, #fff);box-shadow:0 0 20px #fff}

/* ---------- GRAIN ---------- */
.grain{
  position:fixed;inset:-50%;pointer-events:none;z-index:9990;opacity:.08;
  background-image:url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPScyMDAnIGhlaWdodD0nMjAwJz48ZmlsdGVyIGlkPSduJz48ZmVUdXJidWxlbmNlIHR5cGU9J2ZyYWN0YWxOb2lzZScgYmFzZUZyZXF1ZW5jeT0nMC45JyBudW1PY3RhdmVzPScyJyBzdGl0Y2hUaWxlcz0nc3RpdGNoJy8+PGZlQ29sb3JNYXRyaXggdmFsdWVzPScwIDAgMCAwIDEgMCAwIDAgMCAxIDAgMCAwIDAgMSAwIDAgMCAwLjYgMCcvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPScyMDAnIGhlaWdodD0nMjAwJyBmaWx0ZXI9J3VybCglMjNuKScvPjwvc3ZnPg==");
  animation:grain 8s steps(10) infinite;
  mix-blend-mode:overlay;
}
@keyframes grain{
  0%,100%{transform:translate(0,0)}
  10%{transform:translate(-5%,-10%)}
  20%{transform:translate(-15%,5%)}
  30%{transform:translate(7%,-25%)}
  40%{transform:translate(-5%,25%)}
  50%{transform:translate(-15%,10%)}
  60%{transform:translate(15%,0)}
  70%{transform:translate(0,15%)}
  80%{transform:translate(3%,35%)}
  90%{transform:translate(-10%,10%)}
}

/* ---------- STARFIELD ---------- */
.starfield{
  position:fixed;inset:0;pointer-events:none;z-index:0;
}
.star{
  position:absolute;width:2px;height:2px;border-radius:50%;
  background:#fff;
  animation: twinkle var(--dur,3s) ease-in-out infinite;
  animation-delay: var(--delay,0s);
}
@keyframes twinkle{
  0%,100%{opacity:.2;transform:scale(1)}
  50%{opacity:1;transform:scale(1.4)}
}

/* ---------- CONSTELLATION OVERLAY ---------- */
.constellation-overlay{
  position:fixed;inset:0;width:100%;height:100%;
  pointer-events:none;z-index:1;opacity:.5;
  will-change:transform;
}

/* ---------- TOP MARGINALIA ---------- */
.top-marginalia{
  position:fixed;top:0;left:0;right:0;z-index:50;
  padding:18px 32px;
  display:flex;justify-content:space-between;align-items:center;
  font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--ink-mute);
  mix-blend-mode:difference;
}
.mono{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-mute)}

/* ---------- SCROLL TRACK ---------- */
.scroll-track{
  position:fixed;top:0;left:0;width:100%;height:1px;z-index:100;
  background:rgba(212,175,55,.08);
}
.scroll-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--gold-deep),var(--gold-bright),var(--gold));
  box-shadow:0 0 10px var(--gold);
  transition:width .1s linear;
}

/* ---------- GLOBAL LAYOUT ---------- */
main#app{position:relative;z-index:5}
section.band{
  position:relative;
  padding: clamp(80px, 10vw, 160px) clamp(24px, 5vw, 80px);
  overflow:hidden;
}
.container{max-width:var(--max);margin:0 auto;position:relative}
.read{max-width:var(--read);margin:0 auto}

/* ---------- TYPE ---------- */
.eyebrow{
  font-family:var(--mono);
  font-size:11px;letter-spacing:.32em;text-transform:uppercase;
  color:var(--gold);
  display:inline-flex;align-items:center;gap:12px;
}
.eyebrow::before,.eyebrow::after{
  content:"";display:inline-block;width:24px;height:1px;background:var(--gold-deep);
}
.eyebrow.no-lines::before,.eyebrow.no-lines::after{display:none}

h1.display{
  font-family:var(--display);
  font-weight:400;
  font-size: clamp(54px, 9vw, 150px);
  line-height:.9;letter-spacing:-0.02em;
  color:var(--ink);
}
h1.display em{font-style:italic;color:var(--gold-bright);font-weight:500}

h2.section-title{
  font-family:var(--display);
  font-weight:400;
  font-size: clamp(42px, 6vw, 96px);
  line-height:.95;letter-spacing:-0.015em;
}
h2.section-title em{font-style:italic;color:var(--gold-bright)}

h3.chapter{
  font-family:var(--display);font-weight:500;font-style:italic;
  font-size: clamp(28px, 3vw, 42px);
  line-height:1.1;color:var(--ink);
  letter-spacing:-0.01em;
}

h4.sub{
  font-family:var(--mono);
  font-size:11px;letter-spacing:.3em;text-transform:uppercase;
  color:var(--gold);
  margin-bottom: 18px;
}

p{
  font-family: var(--serif);
  font-size: clamp(17px, 1.25vw, 19px);
  line-height:1.75;
  color:var(--ink-dim);
  font-weight:400;
}
p strong{color:var(--ink);font-weight:600}
p em{color:var(--gold-bright);font-style:italic}

.lead{
  font-family:var(--serif);
  font-style:italic;
  font-size: clamp(22px, 2vw, 28px);
  line-height:1.5;
  color:var(--ink);
  font-weight:400;
}
.dropcap::first-letter{
  font-family:var(--display);font-weight:700;
  float:left;font-size: 5.2em;line-height:.85;
  padding:8px 16px 0 0;
  color:var(--gold);
  font-style:italic;
}

blockquote.ritual{
  font-family:var(--display);font-style:italic;font-weight:400;
  font-size: clamp(26px, 2.4vw, 38px);
  line-height:1.3;
  color:var(--gold-bright);
  padding: 40px 0 40px 40px;
  border-left:1px solid var(--gold-deep);
  margin: 48px 0;
  position:relative;
}
blockquote.ritual::before{
  content:"✦";position:absolute;left:-9px;top:32px;
  background:var(--void);color:var(--gold);padding:4px 0;
  font-size:14px;
}

/* ---------- REVEAL ---------- */
.reveal{opacity:0;transform:translateY(40px);transition:opacity 1s var(--ease-out), transform 1s var(--ease-out)}
.reveal.in{opacity:1;transform:translateY(0)}
.reveal-up{opacity:0;transform:translateY(80px);transition:opacity 1.2s var(--ease-out), transform 1.2s var(--ease-out)}
.reveal-up.in{opacity:1;transform:translateY(0)}

.stagger > *{opacity:0;transform:translateY(20px);transition:opacity .8s var(--ease-out), transform .8s var(--ease-out)}
.stagger.in > *{opacity:1;transform:translateY(0)}
.stagger.in > *:nth-child(1){transition-delay:.05s}
.stagger.in > *:nth-child(2){transition-delay:.15s}
.stagger.in > *:nth-child(3){transition-delay:.25s}
.stagger.in > *:nth-child(4){transition-delay:.35s}
.stagger.in > *:nth-child(5){transition-delay:.45s}
.stagger.in > *:nth-child(6){transition-delay:.55s}
.stagger.in > *:nth-child(7){transition-delay:.65s}
.stagger.in > *:nth-child(8){transition-delay:.75s}

/* character reveal for display heading */
.char{display:inline-block;opacity:0;transform:translateY(60%) rotate(6deg);transition:opacity 1s var(--ease-out), transform 1s var(--ease-out)}
.char.in{opacity:1;transform:translateY(0) rotate(0)}

/* ---------- HERO ---------- */
.hero{
  min-height: 100vh;
  display:grid;
  grid-template-columns: 1fr;
  align-items:center;
  padding-top: 80px;
  position:relative;
}
.hero-inner{
  display:grid;
  grid-template-columns: 1fr minmax(320px, 480px);
  gap: clamp(40px, 6vw, 120px);
  align-items:center;
  position:relative;
  z-index:5;
}
@media (max-width: 980px){.hero-inner{grid-template-columns:1fr;gap:60px}}

.hero-meta{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:24px;margin-top:56px;margin-bottom:56px;
  border-top:1px solid rgba(212,175,55,.14);
  border-bottom:1px solid rgba(212,175,55,.14);
  padding: 20px 0;
}
.hero-meta-cell{display:flex;flex-direction:column;gap:6px}
.hero-meta-cell .k{font-family:var(--mono);font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-mute)}
.hero-meta-cell .v{font-family:var(--serif);font-style:italic;font-size:20px;color:var(--ink)}

.hero-description{
  max-width: 520px;
  margin-top: 32px;
}

/* Natal chart SVG */
.natal-wrap{
  position:relative;
  width: 100%;
  aspect-ratio: 1/1;
}
.natal-wrap svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
.rotate-slow{animation: rotSlow 140s linear infinite}
.rotate-med{animation: rotSlow 80s linear infinite reverse}
@keyframes rotSlow{from{transform:rotate(0)}to{transform:rotate(360deg)}}

.planet-glow{filter: drop-shadow(0 0 8px currentColor)}

/* ---------- TOC / RESUMEN ---------- */
.toc-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:0;margin-top:80px;
  border-top:1px solid rgba(212,175,55,.15);
}
.toc-item{
  padding: 32px 28px;
  border-right:1px solid rgba(212,175,55,.12);
  border-bottom:1px solid rgba(212,175,55,.12);
  transition: background .5s, border-color .5s;
  position:relative;
}
.toc-item:hover{background:var(--gold-wash)}
.toc-item:hover .toc-arrow{transform:translate(6px,-6px);color:var(--gold-bright)}
.toc-num{font-family:var(--mono);font-size:11px;color:var(--gold);letter-spacing:.2em}
.toc-title{font-family:var(--display);font-style:italic;font-size:28px;margin-top:18px;line-height:1.1;color:var(--ink)}
.toc-desc{font-family:var(--serif);font-size:15px;color:var(--ink-mute);margin-top:12px;line-height:1.5}
.toc-arrow{position:absolute;top:28px;right:24px;color:var(--gold-deep);font-family:var(--mono);font-size:20px;transition:transform .4s var(--ease-out), color .4s}

/* ---------- KEY/VALUE STRIPS ---------- */
.kv-strip{
  display:grid;grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
  gap:0;
  border-top:1px solid rgba(212,175,55,.18);
  border-bottom:1px solid rgba(212,175,55,.18);
  margin: 48px 0;
}
.kv-cell{
  padding: 24px 20px;
  border-right:1px solid rgba(212,175,55,.10);
}
.kv-cell:last-child{border-right:0}
.kv-cell .k{font-family:var(--mono);font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-mute)}
.kv-cell .v{font-family:var(--display);font-style:italic;font-size:clamp(24px,2.2vw,32px);color:var(--gold-bright);margin-top:8px;font-weight:500}

/* ---------- TWO-COLUMN READ ---------- */
.two-col{
  display:grid;grid-template-columns: 1fr 1fr;gap:clamp(32px,4vw,80px);
  align-items:start;
}
@media (max-width:860px){.two-col{grid-template-columns:1fr}}

.read-col p + p{margin-top: 1.2em}
.read-col h4.sub{margin-top: 40px}

/* ---------- NUMEROLOGY ---------- */
.numerology-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:1px;background:rgba(212,175,55,.14);
  border:1px solid rgba(212,175,55,.14);
  margin-top:64px;
}
.num-cell{
  background: linear-gradient(180deg, rgba(10,10,26,.9), rgba(5,5,16,.95));
  padding: 40px 28px;
  display:flex;flex-direction:column;gap:10px;
  position:relative;overflow:hidden;
  transition: background .6s;
}
.num-cell::before{
  content:"";position:absolute;top:-40%;left:-20%;width:80%;height:80%;
  background:radial-gradient(circle, rgba(212,175,55,.12), transparent 60%);
  transition: transform .8s var(--ease-out);
}
.num-cell:hover::before{transform: translate(20%,20%)}
.num-big{
  font-family:var(--display);font-weight:300;font-style:italic;
  font-size: clamp(72px,7vw,110px);line-height:.9;color:var(--gold-bright);
  letter-spacing:-0.04em;
}
.num-label{font-family:var(--mono);font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-mute)}
.num-desc{font-family:var(--serif);font-size:15px;color:var(--ink-dim);line-height:1.55;margin-top:12px}

/* ---------- SCORE ROW (amor/dinero/suerte) ---------- */
.score-row{
  display:grid;grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap:32px;margin: 56px 0;
}
.score{
  position:relative;
  padding: 28px 20px;
  border: 1px solid rgba(212,175,55,.2);
  background: linear-gradient(180deg, rgba(17,17,40,.6), rgba(5,5,16,.3));
}
.score .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-mute)}
.score .val{font-family:var(--display);font-style:italic;font-size:42px;color:var(--gold-bright);margin:8px 0}
.score .bar{height:2px;background:rgba(212,175,55,.14);position:relative;margin-top:12px;overflow:hidden}
.score .bar::after{content:"";position:absolute;left:0;top:0;height:100%;width:var(--w,70%);background:linear-gradient(90deg,var(--gold-deep),var(--gold-bright));transition: width 1.5s var(--ease-out)}
.score .note{font-family:var(--serif);font-size:14px;color:var(--ink-dim);margin-top:12px;line-height:1.5}

/* ---------- TIMELINE ---------- */
.timeline{
  position:relative;margin-top: 56px;
  border-left:1px solid rgba(212,175,55,.2);
  padding-left: 44px;
}
.tl-item{
  position:relative;padding: 0 0 56px 0;
}
.tl-item::before{
  content:"";position:absolute;left:-50px;top:8px;
  width:12px;height:12px;border-radius:50%;
  background:var(--gold);box-shadow:0 0 0 4px var(--void), 0 0 16px var(--gold);
}
.tl-date{font-family:var(--mono);font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold)}
.tl-title{font-family:var(--display);font-style:italic;font-size:28px;color:var(--ink);margin:10px 0 12px;line-height:1.2}
.tl-body{font-family:var(--serif);font-size:17px;color:var(--ink-dim);line-height:1.7;max-width:640px}

/* ---------- TRANSITS TABLE ---------- */
.transits{
  width:100%;border-collapse:collapse;margin-top:48px;
  font-family:var(--serif);
}
.transits th,.transits td{
  padding: 20px 16px;text-align:left;
  border-bottom:1px solid rgba(212,175,55,.12);
  font-size: 16px;
}
.transits th{
  font-family:var(--mono);font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);font-weight:400;
  border-bottom:1px solid rgba(212,175,55,.25);
}
.transits tr:hover td{background:rgba(212,175,55,.04)}
.transits td .glyph{color:var(--gold-bright);font-size:22px;margin-right:10px;font-family:var(--display)}

/* ---------- RUNE CARDS (rituales/suerte) ---------- */
.rune-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap: 24px;margin-top:56px;
}
.rune-card{
  position:relative;
  padding: 40px 28px;
  border:1px solid rgba(212,175,55,.2);
  background: radial-gradient(ellipse at top, rgba(123,104,238,.08), transparent 60%), linear-gradient(180deg, rgba(10,10,26,.6), rgba(0,0,0,.3));
  text-align:center;
  transition: border-color .5s, transform .5s var(--ease-out);
}
.rune-card:hover{border-color:var(--gold);transform:translateY(-6px)}
.rune-glyph{
  font-family:var(--display);font-size:72px;color:var(--gold-bright);line-height:1;
  margin-bottom: 20px;
  filter: drop-shadow(0 0 12px rgba(212,175,55,.35));
}
.rune-title{font-family:var(--display);font-style:italic;font-size:24px;color:var(--ink);margin-bottom:10px}
.rune-body{font-family:var(--serif);font-size:15px;color:var(--ink-dim);line-height:1.6}

/* ---------- FOOTER / CIERRE ---------- */
.cierre{
  text-align:center;
  padding: clamp(120px, 15vw, 220px) 32px;
  position:relative;
}
.cierre .sigil{
  width: 180px;height: 180px;
  margin: 0 auto 56px;
  display:block;
  animation: rotSlow 120s linear infinite;
}
.cierre h2{
  font-family:var(--display);font-style:italic;font-weight:400;
  font-size: clamp(42px, 6vw, 84px);line-height:1.05;
  color:var(--ink);max-width: 900px;margin: 0 auto;
}
.cierre h2 em{color:var(--gold-bright)}
.cierre .sig-line{
  font-family:var(--mono);font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-mute);
  margin-top: 80px;
}

.cta-area{margin-top: 72px;display:flex;flex-direction:column;align-items:center;gap: 24px}
.btn-ritual{
  display:inline-block;
  padding: 22px 48px;
  border:1px solid var(--gold);
  color:var(--gold-bright);
  font-family:var(--mono);font-size:12px;letter-spacing:.32em;text-transform:uppercase;
  position:relative;overflow:hidden;
  transition: color .5s, border-color .5s;
}
.btn-ritual::before{
  content:"";position:absolute;inset:0;
  background: linear-gradient(90deg, var(--gold-deep), var(--gold-bright));
  transform: translateX(-101%);
  transition: transform .6s var(--ease-out);
  z-index:-1;
}
.btn-ritual:hover{color:var(--void);border-color:var(--gold-bright)}
.btn-ritual:hover::before{transform:translateX(0)}
.btn-ritual .arrow{margin-left:12px;display:inline-block;transition:transform .4s}
.btn-ritual:hover .arrow{transform:translateX(6px)}

.btn-ghost{
  font-family:var(--mono);font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-dim);
  border-bottom:1px solid var(--ink-mute);padding-bottom:4px;
  transition: color .3s, border-color .3s;
}
.btn-ghost:hover{color:var(--gold);border-color:var(--gold)}

/* ---------- CHAPTER SYMBOL ---------- */
.chapter-symbol{
  width: clamp(120px, 14vw, 180px);
  height: clamp(120px, 14vw, 180px);
  display:block;
  margin: 0 0 32px;
  filter: drop-shadow(0 0 18px rgba(212,175,55,.25));
  opacity:0;transform:translateY(20px) scale(.9) rotate(-6deg);
  transition: opacity 1.2s var(--ease-out), transform 1.2s var(--ease-out);
}
.reveal-up.in .chapter-symbol,
.reveal.in .chapter-symbol,
.chapter-symbol.in{opacity:1;transform:translateY(0) scale(1) rotate(0)}
.chapter-symbol.float{animation: floatSym 9s ease-in-out infinite}
@keyframes floatSym{
  0%,100%{transform: translateY(0) rotate(0)}
  50%{transform: translateY(-10px) rotate(2deg)}
}

/* ---------- SECTION DIVIDER ---------- */
.divider-sigil{
  display:flex;align-items:center;justify-content:center;gap:24px;
  margin: 80px auto;opacity:.6;
}
.divider-sigil .line{flex:1;max-width:200px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-deep),transparent)}
.divider-sigil .sigil{color:var(--gold);font-size:20px;font-family:var(--display)}

/* ---------- PARALLAX DEPTH ---------- */
.depth-1{will-change:transform}
.depth-2{will-change:transform}
.depth-3{will-change:transform}

/* subtle ornament glyph */
.corner-ornament{
  position:absolute;
  font-family:var(--display);font-style:italic;color:var(--gold-deep);
  opacity:.4;font-size:40px;line-height:1;
  pointer-events:none;user-select:none;
}

/* ---------- ZODIAC WHEEL ---------- */
.wheel-label{font-family:var(--mono);font-size:10px;letter-spacing:.2em;fill:var(--ink-mute);text-transform:uppercase}
.wheel-glyph{font-family:var(--display);fill:var(--gold-bright);font-size:24px}
.wheel-ring{fill:none;stroke:rgba(212,175,55,.3);stroke-width:.5}
.wheel-spoke{stroke:rgba(212,175,55,.15);stroke-width:.5}
.wheel-gold{fill:var(--gold-bright)}

/* ---------- RESPONSIVE ---------- */
@media (max-width: 640px){
  section.band{padding: 90px 20px}
  .hero-meta{grid-template-columns:1fr}
  .kv-strip{grid-template-columns:1fr 1fr}
  .top-marginalia{padding:12px 16px}
}

/* Respect reduced motion */
@media (prefers-reduced-motion: reduce){
  *{animation:none!important;transition:none!important}
  .reveal,.reveal-up,.char{opacity:1!important;transform:none!important}
  .stagger > *{opacity:1!important;transform:none!important}
}

<script>
/* ==== UI HELPERS: cursor, starfield, reveals, constellation, clock ==== */
(function(){
  const $ = (s,r=document)=>r.querySelector(s);
  const $$ = (s,r=document)=>Array.from(r.querySelectorAll(s));

  window.UI = { $, $$ };

  // ---- Starfield ----
  function starfield(){
    const layer = $('#starfield'); if(!layer) return;
    const count = window.innerWidth < 640 ? 80 : 160;
    const frag = document.createDocumentFragment();
    for(let i=0;i<count;i++){
      const s = document.createElement('span');
      s.className = 'star';
      const size = Math.random() < .12 ? 3 : (Math.random() < .4 ? 2 : 1);
      s.style.width = size+'px';
      s.style.height = size+'px';
      s.style.left = (Math.random()*100)+'%';
      s.style.top = (Math.random()*100)+'%';
      s.style.setProperty('--dur', (2 + Math.random()*5)+'s');
      s.style.setProperty('--delay', (Math.random()*5)+'s');
      if(Math.random() < .15){
        s.style.background = '#ffd96a';
        s.style.boxShadow = '0 0 6px #ffd96a';
      }
      frag.appendChild(s);
    }
    layer.appendChild(frag);
  }

  // ---- Constellation overlay (subtle dots + random lines) ----
  function constellations(){
    const svg = $('#constellation-overlay'); if(!svg) return;
    const W = 1600, H = 1000;
    const pts = [];
    const N = 60;
    for(let i=0;i<N;i++) pts.push({x: Math.random()*W, y: Math.random()*H});
    let html = '';
    // faint lines between near neighbors
    for(let i=0;i<pts.length;i++){
      for(let j=i+1;j<pts.length;j++){
        const dx = pts[i].x-pts[j].x, dy = pts[i].y-pts[j].y;
        const d = Math.sqrt(dx*dx+dy*dy);
        if(d < 140 && Math.random() < .45){
          html += `<line x1="${pts[i].x}" y1="${pts[i].y}" x2="${pts[j].x}" y2="${pts[j].y}" stroke="rgba(212,175,55,0.12)" stroke-width="0.5"/>`;
        }
      }
    }
    for(const p of pts){
      const r = Math.random() < .15 ? 2 : 1;
      html += `<circle cx="${p.x}" cy="${p.y}" r="${r}" fill="rgba(245,236,215,0.5)"/>`;
    }
    svg.innerHTML = html;
  }

  // ---- Cursor (dot + ring, with lerp) ----
  function cursor(){
    if(matchMedia('(pointer:coarse)').matches) return;
    const dot = $('#cursor-dot'); const ring = $('#cursor-ring');
    if(!dot||!ring) return;
    let mx=innerWidth/2,my=innerHeight/2,dx=mx,dy=my,rx=mx,ry=my;
    addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    function loop(){
      dx += (mx-dx)*.35; dy += (my-dy)*.35;
      rx += (mx-rx)*.15; ry += (my-ry)*.15;
      dot.style.transform = `translate(${dx}px,${dy}px) translate(-50%,-50%)`;
      ring.style.transform = `translate(${rx}px,${ry}px) translate(-50%,-50%)`;
      requestAnimationFrame(loop);
    }
    loop();
    // hover states
    const hoverSel = 'a, button, .toc-item, .rune-card, .num-cell, .btn-ritual, .btn-ghost, .score';
    document.addEventListener('mouseover', e=>{
      if(e.target.closest(hoverSel)){ ring.classList.add('hover'); dot.classList.add('hover'); }
    });
    document.addEventListener('mouseout', e=>{
      if(e.target.closest(hoverSel)){ ring.classList.remove('hover'); dot.classList.remove('hover'); }
    });
  }

  // ---- Reveal on scroll ----
  function reveals(){
    const io = new IntersectionObserver(entries=>{
      entries.forEach(en=>{
        if(en.isIntersecting){ en.target.classList.add('in'); io.unobserve(en.target); }
      });
    }, {threshold:.12, rootMargin:'0px 0px -60px 0px'});
    $$('.reveal, .reveal-up, .stagger').forEach(el=>io.observe(el));
    // char-by-char in display headings
    $$('[data-split]').forEach(el=>{
      const text = el.textContent;
      el.innerHTML = '';
      const words = text.split(/(\s+)/); // keep spaces
      let charIdx = 0;
      words.forEach(word=>{
        if(/^\s+$/.test(word)){
          el.appendChild(document.createTextNode(' '));
          return;
        }
        const wrap = document.createElement('span');
        wrap.className = 'word';
        wrap.style.whiteSpace = 'nowrap';
        wrap.style.display = 'inline-block';
        [...word].forEach(c=>{
          const span = document.createElement('span');
          span.className = 'char';
          span.textContent = c;
          span.style.transitionDelay = (charIdx*0.02)+'s';
          wrap.appendChild(span);
          charIdx++;
        });
        el.appendChild(wrap);
      });
      const cio = new IntersectionObserver(es=>{
        es.forEach(e=>{
          if(e.isIntersecting){
            $$('.char', el).forEach(c=>c.classList.add('in'));
            cio.unobserve(el);
          }
        });
      }, {threshold:.3});
      cio.observe(el);
    });
  }

  // ---- Scroll progress bar ----
  function progress(){
    const fill = $('#scroll-fill');
    if(!fill) return;
    addEventListener('scroll', ()=>{
      const h = document.documentElement;
      const p = (h.scrollTop) / (h.scrollHeight - h.clientHeight);
      fill.style.width = (Math.max(0,Math.min(1,p))*100)+'%';
    }, {passive:true});
  }

  // ---- Parallax (constellation + depth) ----
  function parallax(){
    const overlay = $('#constellation-overlay');
    const depths1 = $$('.depth-1');
    const depths2 = $$('.depth-2');
    const depths3 = $$('.depth-3');
    addEventListener('scroll', ()=>{
      const y = window.scrollY;
      if(overlay) overlay.style.transform = `translate3d(0, ${y*-.06}px, 0)`;
      depths1.forEach(e=>e.style.transform = `translate3d(0,${y*-.04}px,0)`);
      depths2.forEach(e=>e.style.transform = `translate3d(0,${y*-.12}px,0)`);
      depths3.forEach(e=>e.style.transform = `translate3d(0,${y*-.20}px,0)`);
    }, {passive:true});
    // mouse parallax on constellation
    addEventListener('mousemove', e=>{
      if(!overlay) return;
      const x = (e.clientX/innerWidth - .5) * 20;
      const y = (e.clientY/innerHeight - .5) * 20;
      overlay.style.marginLeft = x+'px';
      overlay.style.marginTop  = y+'px';
    });
  }

  // ---- Clock ----
  function clock(){
    const el = $('#clock'); if(!el) return;
    function tick(){
      const d = new Date();
      const pad=n=>String(n).padStart(2,'0');
      el.textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())} · GMT${-d.getTimezoneOffset()/60}`;
    }
    tick(); setInterval(tick, 1000);
  }

  window.UI.init = function(){
    starfield(); constellations(); cursor(); reveals(); progress(); parallax(); clock();
  };
})();

</script>

function renderNatalWheel(){
  const signs = ['♈','♉','♊','♋','♌','♍','♎','♏','♐','♑','♒','♓'];
  const names = ['Aries','Tauro','Géminis','Cáncer','Leo','Virgo','Libra','Escorpio','Sagitario','Capricornio','Acuario','Piscis'];
  const cx=200, cy=200;
  const rOuter = 190, rSigns = 170, rHouses = 130, rInner = 80;

  let outerRing = `<circle class="wheel-ring" cx="${cx}" cy="${cy}" r="${rOuter}"/>
                   <circle class="wheel-ring" cx="${cx}" cy="${cy}" r="${rSigns}"/>
                   <circle class="wheel-ring" cx="${cx}" cy="${cy}" r="${rHouses}" style="stroke-dasharray:2 4"/>
                   <circle class="wheel-ring" cx="${cx}" cy="${cy}" r="${rInner}"/>
                   <circle class="wheel-ring" cx="${cx}" cy="${cy}" r="20"/>`;

  let spokes = '';
  let glyphs = '';
  for(let i=0;i<12;i++){
    const a1 = (i*30 - 90) * Math.PI/180;
    const a2 = ((i+.5)*30 - 90) * Math.PI/180;
    const x1 = cx + Math.cos(a1)*rInner, y1 = cy + Math.sin(a1)*rInner;
    const x2 = cx + Math.cos(a1)*rOuter, y2 = cy + Math.sin(a1)*rOuter;
    spokes += `<line class="wheel-spoke" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"/>`;
    const gx = cx + Math.cos(a2)*(rSigns-18);
    const gy = cy + Math.sin(a2)*(rSigns-18) + 8;
    glyphs += `<text class="wheel-glyph" x="${gx}" y="${gy}" text-anchor="middle">${signs[i]}</text>`;
  }

  // planets positioned around the inner ring (decorative but deliberate)
  const planets = [
    {g:'☉', deg: 58, r: rHouses-14, color:'#ffd96a', label:'Sol'},
    {g:'☽', deg: 201, r: rHouses-22, color:'#e6e6ff', label:'Luna'},
    {g:'☿', deg: 42, r: rHouses-10, color:'#c9c9ff', label:'Mercurio'},
    {g:'♀', deg: 88, r: rHouses-18, color:'#ffd1b0', label:'Venus'},
    {g:'♂', deg: 145, r: rHouses-12, color:'#ff7a5a', label:'Marte'},
    {g:'♃', deg: 273, r: rHouses-20, color:'#ffd96a', label:'Júpiter'},
    {g:'♄', deg: 310, r: rHouses-12, color:'#bfa26a', label:'Saturno'},
    {g:'♅', deg: 18, r: rHouses-26, color:'#9edcff', label:'Urano'},
    {g:'♆', deg: 242, r: rHouses-8, color:'#6ea8ff', label:'Neptuno'},
    {g:'♇', deg: 328, r: rHouses-30, color:'#c08bff', label:'Plutón'}
  ];
  let planetMarks = '';
  for(const p of planets){
    const a = (p.deg - 90) * Math.PI/180;
    const px = cx + Math.cos(a)*p.r;
    const py = cy + Math.sin(a)*p.r;
    planetMarks += `
      <g class="planet-glow" style="color:${p.color}">
        <circle cx="${px}" cy="${py}" r="10" fill="rgba(5,5,16,.95)" stroke="${p.color}" stroke-width=".6"/>
        <text x="${px}" y="${py+5}" text-anchor="middle" fill="${p.color}" font-family="Playfair Display" font-size="14">${p.g}</text>
      </g>
    `;
  }

  // aspect lines (decorative)
  let aspects = '';
  const aspectPairs = [[0,4],[1,5],[2,6],[3,7],[8,9]];
  for(const [i,j] of aspectPairs){
    const ai = (planets[i].deg - 90)*Math.PI/180;
    const aj = (planets[j].deg - 90)*Math.PI/180;
    const xi = cx + Math.cos(ai)*planets[i].r;
    const yi = cy + Math.sin(ai)*planets[i].r;
    const xj = cx + Math.cos(aj)*planets[j].r;
    const yj = cy + Math.sin(aj)*planets[j].r;
    aspects += `<line x1="${xi}" y1="${yi}" x2="${xj}" y2="${yj}" stroke="rgba(212,175,55,0.25)" stroke-width=".6" stroke-dasharray="3 3"/>`;
  }

  return `
  <div class="natal-wrap">
    <svg viewBox="0 0 400 400" class="rotate-slow" style="position:absolute;inset:0">
      <defs>
        <radialGradient id="coreGlow">
          <stop offset="0" stop-color="rgba(212,175,55,.5)"/>
          <stop offset="1" stop-color="transparent"/>
        </radialGradient>
      </defs>
      ${outerRing}
      ${spokes}
      ${glyphs}
    </svg>
    <svg viewBox="0 0 400 400" style="position:absolute;inset:0">
      <circle cx="200" cy="200" r="60" fill="url(#coreGlow)"/>
      ${aspects}
      ${planetMarks}
      <text x="200" y="196" text-anchor="middle" font-family="Playfair Display" font-style="italic" font-size="22" fill="#f0ce5a">Anima</text>
      <text x="200" y="218" text-anchor="middle" font-family="JetBrains Mono" font-size="8" letter-spacing="2" fill="#bfb39a">MAPA NATAL</text>
    </svg>
  </div>
  `;
}
