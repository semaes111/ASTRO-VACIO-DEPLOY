services:
  astro-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SITE_URL: https://astrodorado.com
    image: astro-web:latest
    container_name: astrodorado-web
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      # Server-only (no prefijo NEXT_PUBLIC_)
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - ASTROLOGY_API_USER_ID=${ASTROLOGY_API_USER_ID}
      - ASTROLOGY_API_KEY=${ASTROLOGY_API_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      # URL interna de n8n en la misma red Docker (latencia sub-ms)
      - N8N_INTERNAL_URL=http://n8n:5678
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.astrodorado.rule=Host(`astrodorado.com`) || Host(`www.astrodorado.com`)"
      - "traefik.http.routers.astrodorado.entrypoints=websecure"
      - "traefik.http.routers.astrodorado.tls=true"
      - "traefik.http.routers.astrodorado.tls.certresolver=letsencrypt"
      - "traefik.http.services.astrodorado.loadbalancer.server.port=3000"
      # Redirect www → apex
      - "traefik.http.middlewares.astrodorado-www-redirect.redirectregex.regex=^https://www\\.astrodorado\\.com/(.*)"
      - "traefik.http.middlewares.astrodorado-www-redirect.redirectregex.replacement=https://astrodorado.com/$${1}"
      - "traefik.http.middlewares.astrodorado-www-redirect.redirectregex.permanent=true"
      - "traefik.http.routers.astrodorado.middlewares=astrodorado-www-redirect"

networks:
  dokploy-network:
    external: true
